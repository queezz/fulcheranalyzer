site_name: Fulcher Analyzer
site_description: Molecular hydrogen Fulcher-α emission analyzer
site_url: https://queezz.github.io/fulcheranalyzer
repo_url: https://github.com/queezz/fulcheranalyzer
repo_name: queezz/fulcheranalyzer
docs_dir: docs

theme:
  name: material
  logo: assets/h2icon.svg
  favicon: assets/h2icon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.image.zoom
  palette:
    - scheme: bh-dark
      primary: custom
      accent: yellow
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - mdx_truly_sane_lists:
      nested_indent: 4
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - styles/brand.css

nav:
  - Home: index.md
  - Usage & workflow:
      - Usage: usage.md
      - Workflow: workflow.md
  - API Overview: api.md
  - Archaeology & refactor:
      - Archaeology Report: ARCHAEOLOGY.md
      - Refactor Status: REFACTOR_STATUS.md
