site_name: FulcherAnalyzer
site_description: Molecular hydrogen Fulcher-α emission analyzer
site_url: https://queezz.github.io/fulcheranalyzer
repo_url: https://github.com/queezz/fulcheranalyzer
repo_name: queezz/fulcheranalyzer

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Usage: usage.md
  - Workflow: workflow.md
  - API Overview: api.md
  - Archaeology Report: ARCHAEOLOGY.md
